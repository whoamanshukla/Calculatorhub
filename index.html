<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Age Calculator Website</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f6f9;
      color: #333;
    }

    /* Navbar */
    header {
      background: #1e2a38;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      color: white;
      font-size: 22px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-size: 16px;
    }

    nav a:hover {
      color: #00c2ff;
    }

    /* Sections */
    section {
      padding: 60px 40px;
    }

    .hero {
      text-align: center;
      background: linear-gradient(to right, #00c2ff, #3a7bd5);
      color: white;
      padding: 80px 20px;
    }

    .hero h2 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    input, button {
      padding: 12px;
      width: 100%;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      background: #1e2a38;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #00c2ff;
    }

    /* About & Contact */
    .box {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      margin-top: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    footer {
      text-align: center;
      background: #1e2a38;
      color: white;
      padding: 15px;
      margin-top: 40px;
    }
  </style>
</head>
